services:
  api:
    build: .
    container_name: events-api
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
    command: ["python3", "src/api.py"]
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: events-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  pipeline:
    build: .
    container_name: events-pipeline
    profiles: ["pipeline"]
    volumes:
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
    # Runs once and exits — scheduled via host cron
    command: ["python3", "src/pipeline.py"]