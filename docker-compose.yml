services:
  frontend:
    image: nginx:alpine
    container_name: events-frontend
    ports:
      - "80:8080"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: .
    container_name: events-api
    expose:
      - "8082"
    volumes:
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - FEEDBACK_RECIPIENT=${FEEDBACK_RECIPIENT}
    command: ["python3", "src/api.py"]
    restart: unless-stopped

  pipeline:
    build: .
    container_name: events-pipeline
    profiles: ["pipeline"]
    volumes:
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - FEEDBACK_RECIPIENT=${FEEDBACK_RECIPIENT}
    command: ["python3", "src/pipeline.py"]

